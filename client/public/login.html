<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Registration — RhinoVoyage</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #E8651A;
    --orange-dark: #C4511A;
    --orange-light: #F5874A;
    --orange-pale: #FDF0E8;
    --green: #1B4332;
    --green-mid: #2D6A4F;
    --green-dark: #0d1f16;
    --cream: #FBF7F0;
    --cream-dark: #F0E8D8;
    --text-dark: #1A1209;
    --text-mid: #4A3728;
    --text-muted: #8A7060;
    --white: #FFFFFF;
    --shadow: 0 8px 32px rgba(13, 31, 22, 0.15);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 50%, #224d3a 100%);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
    position: relative;
  }

  /* Decorative Background Glows */
  .bg-glow-1 {
    position: absolute; top: -10%; left: -10%; width: 40%; height: 50%;
    background: radial-gradient(circle, rgba(232, 101, 26, 0.15) 0%, transparent 70%);
    pointer-events: none; z-index: 1;
  }
  .bg-glow-2 {
    position: absolute; bottom: -10%; right: -10%; width: 50%; height: 60%;
    background: radial-gradient(circle, rgba(82, 183, 136, 0.1) 0%, transparent 70%);
    pointer-events: none; z-index: 1;
  }

  .login-container {
    background: rgba(255, 255, 255, 0.96);
    width: 100%;
    max-width: 480px;
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: var(--shadow);
    z-index: 10;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  /* Logo branding */
  .brand-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .brand-logo {
    width: 150px;
    height: 50px;
    object-fit: contain;
    margin-bottom: 0.5rem;
  }
  .brand-subtitle {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Unified Mode Tabs */
  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    background: var(--cream-dark);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 2rem;
    gap: 4px;
  }
  .tab-btn {
    border: none;
    background: none;
    padding: 0.6rem 0.2rem;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Nunito', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .tab-btn.active {
    background: var(--white);
    color: var(--green);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }

  /* Form groups */
  .form-panel {
    display: none;
  }
  .form-panel.active {
    display: block;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-group {
    margin-bottom: 1.25rem;
    position: relative;
  }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--cream-dark);
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    color: var(--text-dark);
    background: var(--cream);
    outline: none;
    transition: all 0.2s ease;
  }
  .form-group input:focus {
    border-color: var(--orange);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(232, 101, 26, 0.1);
  }

  /* Buttons */
  .btn-submit {
    width: 100%;
    background: var(--orange);
    color: var(--white);
    border: none;
    padding: 0.9rem;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 16px rgba(232, 101, 26, 0.25);
    margin-top: 1.5rem;
  }
  .btn-submit:hover {
    background: var(--orange-light);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232, 101, 26, 0.35);
  }
  .btn-submit:active {
    transform: translateY(0);
  }

  /* Back to home Link */
  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    color: var(--text-muted);
    font-size: 0.85rem;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .back-link:hover {
    color: var(--orange);
  }

  /* Alert styling */
  .alert {
    padding: 0.8rem 1rem;
    border-radius: 10px;
    font-size: 0.82rem;
    margin-bottom: 1.5rem;
    display: none;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .alert-error {
    background: #FFF0F0;
    color: #D32F2F;
    border-color: #FFD2D2;
  }
  .alert-success {
    background: #E8F5E9;
    color: #2E7D32;
    border-color: #C8E6C9;
  }

  @media (max-width: 480px) {
    body {
      padding: 1rem;
    }
    .login-container {
      padding: 1.75rem 1.25rem;
      border-radius: 18px;
    }
    .brand-header {
      margin-bottom: 1.5rem;
    }
    .brand-logo {
      width: 120px;
      height: 40px;
    }
    .mode-tabs {
      margin-bottom: 1.5rem;
      border-radius: 10px;
    }
    .tab-btn {
      font-size: 0.7rem;
      padding: 0.5rem 0.1rem;
      letter-spacing: 0px;
    }
    .btn-submit {
      padding: 0.75rem;
      font-size: 0.9rem;
      margin-top: 1.25rem;
    }
  }
</style>
<script src="./config.js"></script>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="login-container">
  <!-- Brand logo -->
  <div class="brand-header">
    <a href="index.html">
      <img src="./logo.png" alt="RhinoVoyage Logo" class="brand-logo">
    </a>
    <div class="brand-subtitle">Portal Login</div>
  </div>

  <!-- Notification Banner -->
  <div class="alert alert-error" id="errorAlert"></div>
  <div class="alert alert-success" id="successAlert"></div>

  <!-- Tabs for panel selection -->
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="switchMode('user-login', this)">User Login</button>
    <button class="tab-btn" onclick="switchMode('register', this)">Register</button>
    <button class="tab-btn" onclick="switchMode('admin-login', this)">Admin Panel</button>
  </div>

  <!-- USER LOGIN PANEL -->
  <div class="form-panel active" id="panel-user-login">
    <form onsubmit="event.preventDefault(); handleLogin('user');">
      <div class="form-group">
        <label for="user-email">Email Address</label>
        <input type="email" id="user-email" required placeholder="Enter your email address">
      </div>
      <div class="form-group">
        <label for="user-password">Password</label>
        <input type="password" id="user-password" required placeholder="Enter password">
      </div>
      <button type="submit" class="btn-submit">
        Log In
      </button>
    </form>
  </div>

  <!-- REGISTRATION PANEL -->
  <div class="form-panel" id="panel-register">
    <form onsubmit="event.preventDefault(); handleRegister();">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" required placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" required placeholder="e.g. name@example.com">
      </div>
      <div class="form-group">
        <label for="reg-phone">Phone Number</label>
        <input type="tel" id="reg-phone" required placeholder="Enter WhatsApp number">
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" required placeholder="Create a password">
      </div>
      <div class="form-group">
        <label>Account Type</label>
        <div style="display: flex; gap: 20px; margin-top: 5px;">
          <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; text-transform: none; letter-spacing: 0;">
            <input type="radio" name="reg-role" value="user" checked onchange="toggleDriverFields(false)" style="width: auto; margin: 0;"> Traveler
          </label>
          <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; text-transform: none; letter-spacing: 0;">
            <input type="radio" name="reg-role" value="driver" onchange="toggleDriverFields(true)" style="width: auto; margin: 0;"> Driver Partner
          </label>
        </div>
      </div>
      <!-- Driver specific fields -->
      <div id="driver-fields" style="display: none; margin-top: 15px; border-top: 1px dashed var(--cream-dark); padding-top: 15px;">
        <div class="form-group">
          <label for="reg-aadhar">Aadhar Card Number</label>
          <input type="text" id="reg-aadhar" placeholder="12-digit Aadhar number" pattern="\d{12}" title="Please enter exactly 12 digits">
        </div>
        <div class="form-group">
          <label for="reg-aadhar-photo">Upload Aadhar Card Photo</label>
          <input type="file" id="reg-aadhar-photo" accept="image/*" style="background: transparent; border: none; padding: 0;">
        </div>
        <div class="form-group">
          <label for="reg-license">Driving License Number</label>
          <input type="text" id="reg-license" placeholder="Driving License Number">
        </div>
        <div class="form-group">
          <label for="reg-license-photo">Upload Driving License Photo</label>
          <input type="file" id="reg-license-photo" accept="image/*" style="background: transparent; border: none; padding: 0;">
        </div>
      </div>
      <button type="submit" class="btn-submit">
        Create Account
      </button>
    </form>
  </div>

  <!-- ADMIN LOGIN PANEL -->
  <div class="form-panel" id="panel-admin-login">
    <form onsubmit="event.preventDefault(); handleLogin('admin');">
      <div class="form-group">
        <label for="admin-email">Admin Email</label>
        <input type="email" id="admin-email" required placeholder="admin@rhinovoyage.com">
      </div>
      <div class="form-group">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit" style="background: var(--green);">
        Admin Secure Log In
      </button>
    </form>
  </div>

  <a href="index.html" class="back-link">← Back to Homepage</a>
</div>

<script>
  const API_URL = window.API_BASE_URL || 'http://localhost:5000/api';

  function switchMode(mode, btn) {
    // Switch active tab button
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Switch active form panel
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + mode).classList.add('active');

    // Clear alerts
    hideAlerts();
  }

  function showAlert(type, message) {
    const alert = document.getElementById(type + 'Alert');
    alert.innerText = message;
    alert.style.display = 'block';
  }

  function hideAlerts() {
    document.getElementById('errorAlert').style.display = 'none';
    document.getElementById('successAlert').style.display = 'none';
  }

  function toggleDriverFields(show) {
    const fieldsDiv = document.getElementById('driver-fields');
    const aadharInput = document.getElementById('reg-aadhar');
    const licenseInput = document.getElementById('reg-license');
    const aadharPhotoInput = document.getElementById('reg-aadhar-photo');
    const licensePhotoInput = document.getElementById('reg-license-photo');
    
    if (show) {
      fieldsDiv.style.display = 'block';
      aadharInput.required = true;
      licenseInput.required = true;
      aadharPhotoInput.required = true;
      licensePhotoInput.required = true;
    } else {
      fieldsDiv.style.display = 'none';
      aadharInput.required = false;
      licenseInput.required = false;
      aadharPhotoInput.required = false;
      licensePhotoInput.required = false;
      aadharInput.value = '';
      licenseInput.value = '';
      aadharPhotoInput.value = '';
      licensePhotoInput.value = '';
    }
  }

  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
      reader.readAsDataURL(file);
    });
  }

  async function handleLogin(role) {
    hideAlerts();
    const emailInput = document.getElementById(role + '-email');
    const passwordInput = document.getElementById(role + '-password');

    try {
      const response = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: emailInput.value,
          password: passwordInput.value,
          role: role
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || 'Login failed.');
      }

      showAlert('success', 'Login successful! Redirecting...');
      
      // Store token and user details in localStorage
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      // Redirect after a short delay
      setTimeout(() => {
        if (data.user.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else if (data.user.role === 'driver') {
          window.location.href = 'driver-dashboard.html';
        } else {
          const urlParams = new URLSearchParams(window.location.search);
          const redirectUrl = urlParams.get('redirect');
          if (redirectUrl) {
            window.location.href = decodeURIComponent(redirectUrl);
          } else {
            window.location.href = 'user-dashboard.html';
          }
        }
      }, 1000);

    } catch (err) {
      showAlert('error', err.message);
    }
  }

  async function handleRegister() {
    hideAlerts();
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const phone = document.getElementById('reg-phone').value;
    const password = document.getElementById('reg-password').value;
    
    const roleRadio = document.querySelector('input[name="reg-role"]:checked');
    const role = roleRadio ? roleRadio.value : 'user';
    
    const aadhar = document.getElementById('reg-aadhar').value;
    const license = document.getElementById('reg-license').value;

    let aadharPhoto = '';
    let licensePhoto = '';

    if (role === 'driver') {
      const aadharFile = document.getElementById('reg-aadhar-photo').files[0];
      const licenseFile = document.getElementById('reg-license-photo').files[0];

      if (!aadharFile || !licenseFile) {
        showAlert('error', 'Please upload both Aadhar Card and Driving License photos.');
        return;
      }

      try {
        aadharPhoto = await readFileAsBase64(aadharFile);
        licensePhoto = await readFileAsBase64(licenseFile);
      } catch (err) {
        showAlert('error', 'Failed to read document photos. Please try again.');
        return;
      }
    }

    try {
      const response = await fetch(`${API_URL}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, password, role, aadhar, license, aadharPhoto, licensePhoto })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || 'Registration failed.');
      }

      showAlert('success', 'Registration successful! Redirecting to dashboard...');
      
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      setTimeout(() => {
        if (data.user.role === 'driver') {
          window.location.href = 'driver-dashboard.html';
        } else {
          const urlParams = new URLSearchParams(window.location.search);
          const redirectUrl = urlParams.get('redirect');
          if (redirectUrl) {
            window.location.href = decodeURIComponent(redirectUrl);
          } else {
            window.location.href = 'user-dashboard.html';
          }
        }
      }, 1200);

    } catch (err) {
      showAlert('error', err.message);
    }
  }
</script>

</body>
</html>
